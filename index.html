<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alka Gaur Foundation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0a0a0a;
  color:white;
  overflow-x:hidden;
}

/* NAV */
nav {
  position:fixed;
  width:100%;
  padding:20px 50px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  z-index:1000;
}

nav a {
  color:white;
  text-decoration:none;
  margin:0 15px;
}

/* HERO */
.hero {
  height:100vh;
  background:url('https://images.unsplash.com/photo-children') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1 {
  font-size:60px;
  background:linear-gradient(to right,#ff7a18,#ffb347);
  -webkit-background-clip:text;
  color:transparent;
}

/* SECTION */
.section {
  padding:100px 10%;
}

.cards {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px);
}

/* COUNTER */
.counter {
  font-size:40px;
  color:#ffb347;
}

/* BUTTON */
.btn {
  padding:15px 30px;
  background:linear-gradient(to right,#ff7a18,#ffb347);
  border:none;
  border-radius:30px;
  cursor:pointer;
}

</style>
</head>

<body>

<nav>
  <h2>AGF</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="donate.html">Donate</a>
  </div>
</nav>

<section class="hero">
  <div>
    <h1>Transforming Lives</h1>
    <p>Empowering Communities. Creating Hope.</p>
    <button class="btn">Donate Now</button>
  </div>
</section>

<section class="section">
  <h2>Our Impact</h2>
  <div class="cards">
    <div class="card">
      <div class="counter">10K+</div>
      <p>Meals Distributed</p>
    </div>
    <div class="card">
      <div class="counter">2K+</div>
      <p>Students Supported</p>
    </div>
    <div class="card">
      <div class="counter">500+</div>
      <p>Health Camps</p>
    </div>
  </div>
</section>

</body>
</html>
